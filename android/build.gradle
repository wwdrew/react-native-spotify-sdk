buildscript {
  ext.ReactNativeSpotifySdk = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return ReactNativeSpotifySdk[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.wwdrew.reactnativespotifysdk"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

def spotifyArtifactsResolver = file("../scripts/resolve-spotify-artifacts.js")
def spotifyAppRemoteAar = file("../.spotify-sdk-cache/android/spotify-app-remote-release-0.8.0.aar")

tasks.register("resolveSpotifyArtifacts", Exec) {
  if (!spotifyArtifactsResolver.exists()) {
    throw new GradleException("Spotify artifact resolver not found at ${spotifyArtifactsResolver}")
  }

  commandLine "node", spotifyArtifactsResolver.absolutePath
  workingDir file("..")
}

preBuild.dependsOn("resolveSpotifyArtifacts")

dependencies {
  implementation "com.facebook.react:react-android"

  // Spotify Auth from Maven
  implementation "com.spotify.android:auth:3.0.0"

  // Spotify App Remote from resolved local artifact cache
  implementation(files(spotifyAppRemoteAar))
}
